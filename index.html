<script type="text/javascript">
  function initChat() {
    console.log("Prüfe, ob Chatroom verfügbar ist...");
    
    if (typeof window.Chatroom === 'function') {
      console.log("Chatroom gefunden! Starte Konfiguration...");
      try {
        var chatroom = new window.Chatroom({
          host: "https://reimagined-robot-jr5r7w9p5qp4cp9v-5005.app.github.dev",
          title: "Weatherbot",
          container: document.querySelector(".chat-container"),
          welcomeMessage: "Hi, I am a Weatherbot.",
          speechRecognition: "en-US",
          voiceLang: "en-US"
        });
        chatroom.openChat();
        console.log("Chat erfolgreich geöffnet.");
      } catch (e) {
        console.error("Fehler beim Erstellen des Chatrooms:", e);
      }
    } else {
      console.error("KRITISCH: window.Chatroom ist keine Funktion! Das Skript von Statically wurde nicht korrekt geladen oder blockiert.");
    }
  }

  // Sicherstellen, dass das Skript erst läuft, wenn alles geladen ist
  if (document.readyState === "complete") {
    initChat();
  } else {
    window.addEventListener("load", initChat);
  }
</script>
